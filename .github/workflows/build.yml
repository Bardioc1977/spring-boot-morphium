name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build morphium dependencies
        run: |
          # Clone and install morphium (SNAPSHOT dependency)
          git clone --depth 1 https://github.com/Bardioc1977/morphium.git /tmp/morphium
          cd /tmp/morphium
          mvn -B install -DskipTests -pl morphium-core -am

          # Clone and install morphium-jakarta-data (SNAPSHOT dependency)
          git clone --depth 1 https://github.com/Bardioc1977/morphium-jakarta-data.git /tmp/morphium-jakarta-data
          cd /tmp/morphium-jakarta-data
          mvn -B install -DskipTests

      - name: Build with Maven
        run: mvn -B verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7
